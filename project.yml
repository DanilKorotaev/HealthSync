name: HealthSync
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    DEVELOPMENT_TEAM: ""
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
targets:
  HealthSync:
    type: application
    platform: iOS
    sources:
      - path: HealthSync
    dependencies:
      - sdk: HealthKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.HealthSync
        INFOPLIST_KEY_CFBundleDisplayName: HealthSync
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.healthcare-fitness
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: HealthSync.entitlements
    info:
      path: HealthSync/Resources/Info.plist
