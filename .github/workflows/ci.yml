name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-coverage:
    runs-on: macos-latest
    env:
      SCHEME: HealthSync
      MIN_COVERAGE: "35"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate project
        run: xcodegen generate

      - name: Pick simulator
        run: |
          DEVICE_NAME=$(xcrun simctl list devices available | rg "iPhone" -m 1 | sed -E 's/^[[:space:]]*([^\\(]+) \\(.*/\\1/' | xargs)
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          echo "Using simulator: $DEVICE_NAME"

      - name: Run tests with coverage
        run: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult | python3 -c 'import json,sys; print(json.load(sys.stdin)["lineCoverage"] * 100)')
          echo "Line coverage: ${COVERAGE}%"
          python3 - "$COVERAGE" "$MIN_COVERAGE" <<'PY'
          import sys
          current = float(sys.argv[1])
          threshold = float(sys.argv[2])
          if current < threshold:
              print(f"Coverage check failed: {current:.2f}% < {threshold:.2f}%")
              raise SystemExit(1)
          print(f"Coverage check passed: {current:.2f}% >= {threshold:.2f}%")
          PY
